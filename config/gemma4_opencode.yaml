# PMCA config for Gemma 4 via Ollama Docker (port 11435)
# Used as backend for opencode/crush agent proxy

models:
  architect:
    name: "gemma4:e4b"
    provider: "ollama"
    context_window: 16384
    temperature: 0.3
  coder:
    name: "gemma4:e4b"
    provider: "ollama"
    context_window: 16384
    temperature: 0.2
  reviewer:
    name: "gemma4:e2b"
    provider: "ollama"
    context_window: 16384
    temperature: 0.1
  watcher:
    name: "gemma4:e2b"
    provider: "ollama"
    context_window: 16384
    temperature: 0.1

cascade:
  max_depth: 1
  max_retries: 3
  max_children: 3
  leaf_threshold: "function"
  best_of_n: 1
  fresh_start_after: 2
  runtime_fixes: true
  reviewer_bypass_on_pass: true
  spec_literals: true

workspace:
  path: "./workspace"
  git_checkpoint: false

logging:
  level: "INFO"
  file: "./pmca.log"
