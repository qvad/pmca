# Qwen 3.6 27B — latest model, GPU+CPU split

models:
  architect:
    name: "qwen36-8k"
    provider: "ollama"
    context_window: 8192
    temperature: 0.3
    think: false
  coder:
    name: "qwen36-8k"
    provider: "ollama"
    context_window: 8192
    temperature: 0.2
    think: false
  reviewer:
    name: "qwen36-8k"
    provider: "ollama"
    context_window: 8192
    temperature: 0.1
    think: false
  watcher:
    name: "qwen36-8k"
    provider: "ollama"
    context_window: 8192
    temperature: 0.1
    think: false

cascade:
  max_depth: 1
  max_retries: 3
  max_children: 3
  leaf_threshold: "function"
  best_of_n: 1
  fresh_start_after: 2
  runtime_fixes: true
  reviewer_bypass_on_pass: true
  use_llm_reviewer: false
  spec_literals: true
  quality_standards: |
    1. Use EXACT filenames from the user request
    2. Use @dataclass for data containers
    3. Full type annotations, builtin types only (not from typing)
    4. Validate inputs, raise descriptive errors
    5. Use simple patterns — no metaclasses

workspace:
  path: "./workspace"
  git_checkpoint: false

logging:
  level: "INFO"
  file: "./pmca.log"
